name: KMP CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build app and shared modules
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest :shared:compileCommonMainKotlinMetadata :shared:compileDebugKotlinAndroid :shared:testDebugUnitTest --stacktrace

      - name: Run connected Android tests
        run: ./gradlew :app:connectedDebugAndroidTest
        continue-on-error: true
